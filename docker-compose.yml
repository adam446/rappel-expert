services:
  db:
    image: postgres:17-alpine
    container_name: smart_reminder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_password}
      POSTGRES_DB: ${POSTGRES_DB:-smart_reminders}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: smart_reminder_backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_password}
      POSTGRES_DB: ${POSTGRES_DB:-smart_reminders}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-smart_user}:${POSTGRES_PASSWORD:-smart_password}@db:5432/${POSTGRES_DB:-smart_reminders}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: smart_reminder_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
